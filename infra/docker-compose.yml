services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      API_PORT: 8080
      DATABASE_URL: mysql://model_platform:model_platform@mysql:3306/model_optimization_platform
      OPTIMIZER_URL: http://optimizer:3000
      QUEUE_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    depends_on:
      - mysql
      - redis
      - minio

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    environment:
      WORKER_CONCURRENCY: 1
      DATABASE_URL: mysql://model_platform:model_platform@mysql:3306/model_optimization_platform
      OPTIMIZER_URL: http://optimizer:3000
      QUEUE_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      - mysql
      - redis
      - minio
      - optimizer

  optimizer:
    image: ${OPTIMIZER_IMAGE:-ghcr.io/3dugc/3d-model-optimizer:main}
    platform: linux/amd64
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${OPTIMIZER_HOST_PORT:-3000}:3000"

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: model_optimization_platform
      MYSQL_USER: model_platform
      MYSQL_PASSWORD: model_platform
      MYSQL_ROOT_PASSWORD: model_platform_root
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../apps/api/src/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data:
  mysql-data:
